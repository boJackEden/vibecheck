name: "VibeCheck"
description: "Make sure you understand what's going into your codebase. Posts an AI-generated multiple-choice check on each PR, grades on submit, sets a commit status."
branding:
  icon: "check-circle"
  color: "purple"

inputs:
  server-url:
    description: "Base URL of your deployed VibeCheck server (e.g. https://vibecheck-production.up.railway.app)"
    required: true

runs:
  using: "composite"
  steps:
    # --- Generate (PR opened/updated by a human) ---
    - name: Checkout
      if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.user.type != 'Bot'
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Collect diff
      if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.user.type != 'Bot'
      shell: bash
      run: git diff "origin/${{ github.base_ref }}...HEAD" > "$RUNNER_TEMP/vibecheck-diff.txt"

    - name: Generate quiz
      if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.user.type != 'Bot'
      uses: actions/github-script@v7
      env:
        VIBECHECK_SERVER_URL: ${{ inputs.server-url }}
      with:
        script: |
          const fs = require('fs');
          const diff = fs.readFileSync(`${process.env.RUNNER_TEMP}/vibecheck-diff.txt`, 'utf8');
          if (!diff.trim()) { core.info('Empty diff, skipping.'); return; }

          const base = (process.env.VIBECHECK_SERVER_URL || '')
            .replace(/\/$/, '').replace(/^(?!https?:\/\/)/, 'https://');
          const repo = `${context.repo.owner}/${context.repo.repo}`;
          const pr = context.payload.pull_request.number;
          const headSha = context.payload.pull_request.head.sha;

          const idToken = await core.getIDToken('vibecheck');
          const res = await fetch(`${base}/vibecheck/generate`, {
            method: 'POST',
            headers: { 'content-type': 'application/json', authorization: `Bearer ${idToken}` },
            body: JSON.stringify({ repo, pr, diff }),
          });
          if (!res.ok) { core.setFailed(`Server ${res.status}: ${await res.text()}`); return; }
          const { comment } = await res.json();

          const comments = await github.paginate(github.rest.issues.listComments, {
            ...context.repo, issue_number: pr,
          });
          const existing = comments.find(c => c.body.includes('<!-- vibecheck -->'));
          if (existing) {
            await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body: comment });
          } else {
            await github.rest.issues.createComment({ ...context.repo, issue_number: pr, body: comment });
          }

          await github.rest.repos.createCommitStatus({
            ...context.repo, sha: headSha, context: 'VibeCheck',
            state: 'pending', description: 'Take the VibeCheck',
          });

    # --- Grade (developer checked the Submit box) ---
    - name: Grade quiz
      if: >
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '<!-- vibecheck -->') &&
        contains(github.event.comment.body, '[x] ✅') &&
        !contains(github.event.comment.body, '<!-- vibecheck:graded -->')
      uses: actions/github-script@v7
      env:
        VIBECHECK_SERVER_URL: ${{ inputs.server-url }}
      with:
        script: |
          const base = (process.env.VIBECHECK_SERVER_URL || '')
            .replace(/\/$/, '').replace(/^(?!https?:\/\/)/, 'https://');
          const repo = `${context.repo.owner}/${context.repo.repo}`;
          const pr = context.payload.issue.number;
          const commentBody = context.payload.comment.body;

          const idToken = await core.getIDToken('vibecheck');
          const res = await fetch(`${base}/vibecheck/grade`, {
            method: 'POST',
            headers: { 'content-type': 'application/json', authorization: `Bearer ${idToken}` },
            body: JSON.stringify({ repo, pr, commentBody }),
          });
          if (!res.ok) { core.setFailed(`Server ${res.status}: ${await res.text()}`); return; }
          const result = await res.json();
          if (!result.submitted) { core.info('Not submitted yet.'); return; }

          await github.rest.issues.updateComment({
            ...context.repo, comment_id: context.payload.comment.id, body: result.comment,
          });

          const { data: prData } = await github.rest.pulls.get({ ...context.repo, pull_number: pr });
          await github.rest.repos.createCommitStatus({
            ...context.repo, sha: prData.head.sha, context: 'VibeCheck',
            state: result.passed ? 'success' : 'failure',
            description: `VibeCheck ${result.passed ? 'passed' : 'worth another look'}: ${result.score}/${result.total}`,
          });

    # --- Cleanup (PR merged/closed) ---
    - name: Cleanup session
      if: github.event_name == 'pull_request' && github.event.action == 'closed'
      uses: actions/github-script@v7
      env:
        VIBECHECK_SERVER_URL: ${{ inputs.server-url }}
      with:
        script: |
          const base = (process.env.VIBECHECK_SERVER_URL || '')
            .replace(/\/$/, '').replace(/^(?!https?:\/\/)/, 'https://');
          const repo = `${context.repo.owner}/${context.repo.repo}`;
          const pr = context.payload.pull_request.number;
          const idToken = await core.getIDToken('vibecheck');
          await fetch(`${base}/vibecheck/cleanup`, {
            method: 'POST',
            headers: { 'content-type': 'application/json', authorization: `Bearer ${idToken}` },
            body: JSON.stringify({ repo, pr }),
          }).catch(() => {});
