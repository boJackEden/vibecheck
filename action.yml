name: "PR Quiz"
description: "AI-generated code-understanding quiz on pull requests. Posts an interactive checkbox quiz, grades on submit, sets a commit status."
branding:
  icon: "check-circle"
  color: "purple"

inputs:
  server-url:
    description: "Base URL of your deployed pr-quiz server (e.g. https://pr-quiz-production.up.railway.app)"
    required: true

runs:
  using: "composite"
  steps:
    # --- Generate (PR opened/updated by a human) ---
    - name: Checkout
      if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.user.type != 'Bot'
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Collect diff
      if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.user.type != 'Bot'
      shell: bash
      run: git diff "origin/${{ github.base_ref }}...HEAD" > "$RUNNER_TEMP/pr-quiz-diff.txt"

    - name: Generate quiz
      if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.user.type != 'Bot'
      uses: actions/github-script@v7
      env:
        QUIZ_SERVER_URL: ${{ inputs.server-url }}
      with:
        script: |
          const fs = require('fs');
          const diff = fs.readFileSync(`${process.env.RUNNER_TEMP}/pr-quiz-diff.txt`, 'utf8');
          if (!diff.trim()) { core.info('Empty diff, skipping.'); return; }

          const base = (process.env.QUIZ_SERVER_URL || '')
            .replace(/\/$/, '').replace(/^(?!https?:\/\/)/, 'https://');
          const repo = `${context.repo.owner}/${context.repo.repo}`;
          const pr = context.payload.pull_request.number;
          const headSha = context.payload.pull_request.head.sha;

          const idToken = await core.getIDToken('pr-quiz');
          const res = await fetch(`${base}/quiz/generate`, {
            method: 'POST',
            headers: { 'content-type': 'application/json', authorization: `Bearer ${idToken}` },
            body: JSON.stringify({ repo, pr, diff }),
          });
          if (!res.ok) { core.setFailed(`Server ${res.status}: ${await res.text()}`); return; }
          const { comment } = await res.json();

          const comments = await github.paginate(github.rest.issues.listComments, {
            ...context.repo, issue_number: pr,
          });
          const existing = comments.find(c => c.body.includes('<!-- pr-quiz -->'));
          if (existing) {
            await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body: comment });
          } else {
            await github.rest.issues.createComment({ ...context.repo, issue_number: pr, body: comment });
          }

          await github.rest.repos.createCommitStatus({
            ...context.repo, sha: headSha, context: 'Code Understanding Check',
            state: 'pending', description: 'Answer the quiz to pass',
          });

    # --- Grade (developer checked the Submit box) ---
    - name: Grade quiz
      if: >
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '<!-- pr-quiz -->') &&
        contains(github.event.comment.body, '[x] ✅') &&
        !contains(github.event.comment.body, '<!-- pr-quiz:graded -->')
      uses: actions/github-script@v7
      env:
        QUIZ_SERVER_URL: ${{ inputs.server-url }}
      with:
        script: |
          const base = (process.env.QUIZ_SERVER_URL || '')
            .replace(/\/$/, '').replace(/^(?!https?:\/\/)/, 'https://');
          const repo = `${context.repo.owner}/${context.repo.repo}`;
          const pr = context.payload.issue.number;
          const commentBody = context.payload.comment.body;

          const idToken = await core.getIDToken('pr-quiz');
          const res = await fetch(`${base}/quiz/grade`, {
            method: 'POST',
            headers: { 'content-type': 'application/json', authorization: `Bearer ${idToken}` },
            body: JSON.stringify({ repo, pr, commentBody }),
          });
          if (!res.ok) { core.setFailed(`Server ${res.status}: ${await res.text()}`); return; }
          const result = await res.json();
          if (!result.submitted) { core.info('Not submitted yet.'); return; }

          await github.rest.issues.updateComment({
            ...context.repo, comment_id: context.payload.comment.id, body: result.comment,
          });

          const { data: prData } = await github.rest.pulls.get({ ...context.repo, pull_number: pr });
          await github.rest.repos.createCommitStatus({
            ...context.repo, sha: prData.head.sha, context: 'Code Understanding Check',
            state: result.passed ? 'success' : 'failure',
            description: `Quiz ${result.passed ? 'passed' : 'failed'}: ${result.score}/${result.total}`,
          });

    # --- Cleanup (PR merged/closed) ---
    - name: Cleanup session
      if: github.event_name == 'pull_request' && github.event.action == 'closed'
      uses: actions/github-script@v7
      env:
        QUIZ_SERVER_URL: ${{ inputs.server-url }}
      with:
        script: |
          const base = (process.env.QUIZ_SERVER_URL || '')
            .replace(/\/$/, '').replace(/^(?!https?:\/\/)/, 'https://');
          const repo = `${context.repo.owner}/${context.repo.repo}`;
          const pr = context.payload.pull_request.number;
          const idToken = await core.getIDToken('pr-quiz');
          await fetch(`${base}/quiz/cleanup`, {
            method: 'POST',
            headers: { 'content-type': 'application/json', authorization: `Bearer ${idToken}` },
            body: JSON.stringify({ repo, pr }),
          }).catch(() => {});
