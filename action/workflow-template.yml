# Copy this into a consuming repo as .github/workflows/pr-quiz.yml
#
# Set QUIZ_SERVER_URL (your deployed server's URL) as a repo OR org variable:
#   Settings -> Secrets and variables -> Actions -> Variables
# Setting it at the ORG level means every repo inherits it — then adding the
# quiz to a new repo is just dropping in this file.
#
# No Anthropic key here — the server holds it. Auth is GitHub Actions OIDC.
name: PR Quiz

on:
  pull_request:
    types: [opened, synchronize, closed]
  issue_comment:
    types: [edited]

permissions:
  contents: read
  pull-requests: write
  statuses: write
  id-token: write

jobs:
  quiz:
    runs-on: ubuntu-latest
    steps:
      - uses: boJackEden/pr-quiz@v1
        with:
          server-url: ${{ vars.QUIZ_SERVER_URL }}
